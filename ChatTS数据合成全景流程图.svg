<svg viewBox="0 0 680 770" width="100%" role="img">
  <title>ChatTS data synthesis panorama</title>
  <desc>Flowchart of ChatTS synthetic data pipeline: attribute pool and GPT selector feed a rule-based time-series generator and a GPT-based QA generator, producing alignment (105k), TSEvol (24,270) and follow (5,050) training sets that train ChatTS-14B, evaluated on a Zenodo set.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="34" text-anchor="middle" font-family="var(--font-sans)" font-size="15" font-weight="500" fill="#2C2C2A">ChatTS data synthesis panorama</text>

  <polyline class="arr" points="175,124 175,164" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline class="arr" points="175,216 175,252" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline class="arr" points="300,190 380,190" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline class="arr" points="175,316 175,358" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline class="arr" points="175,410 175,446" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline class="arr" points="505,304 505,340" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline class="arr" points="175,526 175,572 210,596" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline class="arr" points="505,404 505,545 490,596" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline class="arr" points="505,498 470,560 450,596" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline class="arr" points="340,652 340,694" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="50" y="60" width="250" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="175" y="83" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#0C447C">Attribute pool</text>
    <text x="175" y="103" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#185FA5">567 real metric names · 4 attribute types</text>
  </g>

  <g>
    <rect x="50" y="164" width="250" height="52" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="175" y="181" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#0C447C">GPT Selector</text>
    <text x="175" y="199" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#185FA5">LLM picks attribute subset</text>
  </g>

  <g>
    <rect x="50" y="252" width="250" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="175" y="275" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#0C447C">Attribute generator</text>
    <text x="175" y="295" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#185FA5">rule-based waveforms</text>
  </g>

  <g>
    <rect x="50" y="358" width="250" height="52" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="175" y="375" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#0C447C">Synthetic time series</text>
    <text x="175" y="393" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#185FA5">with attribute text</text>
  </g>

  <g>
    <rect x="50" y="446" width="250" height="80" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="175" y="468" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#27500A">Alignment data</text>
    <text x="175" y="490" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#3B6D11">UTS · MTS-Shape · MTS-Local</text>
    <text x="175" y="508" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#3B6D11">105k samples</text>
  </g>

  <g>
    <rect x="380" y="252" width="250" height="52" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="505" y="269" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#0C447C">Seed QA pool</text>
    <text x="505" y="287" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#185FA5">template + LLM seed</text>
  </g>

  <g>
    <rect x="380" y="340" width="250" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="505" y="363" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#0C447C">TSEvol evolution</text>
    <text x="505" y="383" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#185FA5">LLM evolves seed Q&amp;A · 24,270</text>
  </g>

  <g>
    <rect x="380" y="446" width="250" height="52" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="505" y="463" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#0C447C">Follow instructions</text>
    <text x="505" y="481" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#185FA5">instruction-following · 5,050</text>
  </g>

  <g>
    <rect x="180" y="596" width="320" height="56" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="340" y="615" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#27500A">Train ChatTS-14B</text>
    <text x="340" y="633" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#3B6D11">align 105k + SFT 29k</text>
  </g>

  <g>
    <rect x="180" y="694" width="320" height="56" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="340" y="713" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#27500A">Eval set (Zenodo)</text>
    <text x="340" y="731" text-anchor="middle" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#3B6D11">real + synthetic</text>
  </g>
</svg>
